# Z-Sim v3.0 — DERIVED Closures Configuration
# 7/8 parameters DERIVED from ZS-Q7 §5.1, Theorem 1, Theorem 3A
# Only phase_mode remains HYPOTHESIS → DERIVED (SU(2) j=1/2)
#
# CRITICAL: A must be specified as fraction 35/437 to avoid
# IEEE 754 floating-point truncation (see v2.2 bug report).

model:
  A: 35/437
  dims:
    X: 3
    Z: 2
    Y: 6
  enforce_zero_xy: true
  enforce_rank2_xy: true

closure:
  wx: 0.0                    # [TRANSLATED: CDM w=0]
  wz: -1.0                   # [DERIVED-CONDITIONAL: V(ε=1)=0 at attractor]
  wy: 1/3                    # [TRANSLATED: radiation w=1/3]
  gamma_xz: 0.01456210       # 2A/Q [DERIVED: ZS-Q7 §5.1 Fermi golden rule]
  gamma_zy: 0.04368629       # 6A/Q [DERIVED: ZS-Q7 §5.1 Fermi golden rule]
  alpha_xz: 1.5              # dim(X)/dim(Z) [DERIVED: Theorem 1 detailed balance]
  alpha_zy: 1/3              # dim(Z)/dim(Y) [DERIVED: Theorem 1 detailed balance]
  phase_mode: spinor_sin2    # [DERIVED: SU(2) j=1/2 Π_Z = sin²(φ/2), ZS-M3]
  epsilon_potential: quartic  # [DERIVED: ZS-F1]
  lam: 1.79                  # [DERIVED: ZS-F1 §4.4]
  phase_source_mode: full_state
  mediation_mode: raw_contrast
  epsilon_source_mode: gate_current_difference
  h_closure_mode: sqrt_sum_plus_epsilon

initial:
  N0: -18.0
  a0: 1.522997974e-8
  h0: 1.0
  epsilon0: 1.0              # [TRANSLATED: attractor start]
  pi_epsilon0: 0.0
  rho_x0: 3/11               # dim(X)/Q [DERIVED: equipartition ZS-Q5 §5.2]
  rho_z0: 2/11               # dim(Z)/Q [DERIVED: equipartition ZS-Q5 §5.2]
  rho_y0: 6/11               # dim(Y)/Q [DERIVED: equipartition ZS-Q5 §5.2]
  phi_z0: 0.0
  sigma_struct0: 0.0

solver:
  method: RK45
  rtol: 1.0e-10
  atol: 1.0e-12
  N_end: 20.0
  max_step: 0.02
  projection_every: 1

outputs:
  save_state_csv: true
  save_observables_csv: true
  save_diagnostics_json: true
  make_plots: true
