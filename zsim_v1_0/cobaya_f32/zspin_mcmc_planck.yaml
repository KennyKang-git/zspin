# ═══════════════════════════════════════════════════════════════════
# Z-Spin Cosmology — Cobaya Full Planck 2018 MCMC
# Gate F32-12: Definitive Tier-1 CMB Test
# ═══════════════════════════════════════════════════════════════════
#
# v1.0: H0_CMB = 67.36 from Tier-0.5, all other params from A=35/437
#
# Paper 21 v2.3.0 specification:
#   "standard CLASS/CAMB (unmodified) with Z-Spin parameter mapping"
#   "m_ε ≈ 1.34 M_P → ε-field frozen → Z-Spin = effective LCDM"
#
# PASS/FAIL CRITERION (Paper 32):
#   If best-fit Δχ² < 10 relative to Planck LCDM → PASS
#   If Δχ² > 25 (5σ equivalent) → FAIL
#
# INSTALLATION:
#   pip install cobaya camb
#   cobaya-install cosmo --packages-path ~/packages
#
# RUN:
#   cobaya-run cobaya_f32/zspin_mcmc_planck.yaml \
#     --packages-path ~/packages
# ═══════════════════════════════════════════════════════════════════

likelihood:
  # Full Planck 2018 likelihood suite
  planck_2018_lowl.TT:
  planck_2018_lowl.EE:
  planck_2018_highl_plik.TTTEEE:
  planck_2018_lensing.clik:

theory:
  camb:
    extra_args:
      lens_potential_accuracy: 1
      num_massive_neutrinos: 1
      mnu: 0.06
      nnu: 3.046
      halofit_version: mead
      bbn_predictor: PArthENoPE_880.2_standard.dat
      theta_H0_range:
        - 20
        - 100

params:
  # ═══ FIXED (Z-Spin locked — these define the framework) ═══
  H0: 67.36                  # Planck 2018 (Z-Spin Tier-0.9 validated)
  ombh2: 0.02250            # (6/121) × h² [BARE, no G_eff — Tier-0.9 validated]
  omch2: 0.12000            # 32/121 × h² [FACE, truncated icosahedron]
  ns: 0.9674                 # Paper 18 canonical inflation (N*=60)

  # ═══ SAMPLED (only 2 free parameters) ═══
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref:
      dist: norm
      loc: 3.044
      scale: 0.014
    proposal: 0.001
    latex: \log(10^{10} A_s)
    drop: true

  As:
    value: "lambda logA: 1e-10*np.exp(logA)"
    latex: A_s

  tau:
    prior:
      min: 0.01
      max: 0.15
    ref:
      dist: norm
      loc: 0.054
      scale: 0.007
    proposal: 0.003
    latex: \tau_\mathrm{reio}

  # ═══ DERIVED (monitored, not sampled) ═══
  sigma8:
    latex: \sigma_8
  S8:
    derived: "lambda sigma8, omegam: sigma8*(omegam/0.3)**0.5"
    latex: S_8
  omegam:
    latex: \Omega_m
  omegal:
    latex: \Omega_\Lambda
  rdrag:
    latex: r_\mathrm{drag}
  age:
    latex: '{\rm{Age}}/\mathrm{Gyr}'
  zrei:
    latex: z_\mathrm{re}

sampler:
  mcmc:
    burn_in: 0.3
    max_tries: 40d
    covmat: auto
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2

output: zspin_mcmc_planck_output
