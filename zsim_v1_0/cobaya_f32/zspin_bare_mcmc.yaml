# ═══════════════════════════════════════════════════════════════
# Z-Spin — Bare Mapping MCMC (Test 1)
# All matter densities at BARE (physical) values
# omega_b = 6/121 × h², omega_cdm = 32/121 × h²  [v1.0: face counting; was 33/121]
# ═══════════════════════════════════════════════════════════════

likelihood:
  planck_2018_highl_plik.TTTEEE_lite:
  tau_prior:
    external: "lambda tau: -0.5*((tau - 0.054)/0.007)**2"

theory:
  camb:

params:
  H0: 67.36
  ombh2: 0.02250
  omch2: 0.12375
  ns: 0.9674

  logA:
    prior:
      min: 2.6
      max: 3.5
    ref: 3.044
    proposal: 0.005
    latex: \log(10^{10} A_s)
    drop: true

  As:
    value: "lambda logA: 1e-10*np.exp(logA)"
    latex: A_s

  tau:
    prior:
      min: 0.01
      max: 0.12
    ref: 0.054
    proposal: 0.003
    latex: \tau_\mathrm{reio}

  A_planck:
    prior:
      dist: norm
      loc: 1
      scale: 0.0025
    ref: 1.0
    proposal: 0.001
    latex: A_{planck}

  sigma8:
    latex: \sigma_8
  S8:
    derived: "lambda sigma8, omegam: sigma8*(omegam/0.3)**0.5"
    latex: S_8
  omegam:
    latex: \Omega_m

sampler:
  mcmc:
    burn_in: 0.3
    max_tries: 1000
    Rminus1_stop: 0.05

output: zspin_bare_mcmc_output
